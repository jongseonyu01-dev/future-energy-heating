<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 로그인 - 퓨처에너지테크</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 72px; height: 72px; border-radius: 16px; margin: 0 auto 12px; object-fit: cover; display: block; }
    .logo-name { font-size: 22px; font-weight: 800; color: #e85d04; }
    .logo-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center; color: #1f2937; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input { width: 100%; padding: 13px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: inherit; transition: border-color .15s; }
    input:focus { outline: none; border-color: #e85d04; }
    .login-btn { width: 100%; padding: 14px; background: #e85d04; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .15s; }
    .login-btn:hover { background: #c44d00; }
    .login-btn:disabled { background: #d1d5db; cursor: not-allowed; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #dc2626; margin-bottom: 16px; display: none; }
    .back-link { text-align: center; margin-top: 20px; font-size: 14px; color: #6b7280; }
    .back-link a { color: #e85d04; font-weight: 600; }
    .role-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .role-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-hq { background: #fef3c7; color: #92400e; }
    .badge-branch { background: #dbeafe; color: #1e40af; }
    .badge-tech { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663730788081/hTdx5kSeE7mshzAjGega74/app-icon-58W97D3UGLWn9JzTakGt8a.webp" alt="퓨처에너지테크" class="logo-icon" />
    <div class="logo-name">퓨처에너지테크</div>
    <div class="logo-sub">Future Energy Tech &middot; 직원 전용</div>
  </div>
  <div class="role-badges">
    <span class="role-badge badge-hq">본사 관리자</span>
    <span class="role-badge badge-branch">지사장</span>
    <span class="role-badge badge-tech">현장 기사</span>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>아이디</label>
    <input type="text" id="username" placeholder="아이디를 입력하세요" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()" />
  </div>
  <div class="form-group">
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()" />
  </div>
  <button class="login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
  <div class="back-link"><a href="/preview/index.html">← 고객 홈페이지로 돌아가기</a></div>
</div>
<script>
  // API 서버 기본 URL: 배포 환경에서는 같은 origin, 개발 환경에서는 3000 포트
  function getApiBase() {
    const host = window.location.hostname;
    // 개발 미리보기: 호스트명이 808x-xxx 패턴이면 3000-xxx로 변환
    const devMatch = host.match(/^(808\d)-(.*)/); 
    if (devMatch) {
      return window.location.protocol + '//' + '3000-' + devMatch[2];
    }
    return '';
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
      errEl.textContent = '아이디와 비밀번호를 입력해 주세요.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true; btn.textContent = '로그인 중...';
    errEl.style.display = 'none';

    try {
      const apiBase = getApiBase();
      const res = await fetch(apiBase + '/api/trpc/auth.login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ json: { loginId: username, password } })
      });

      let data;
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        data = await res.json();
      } else {
        const text = await res.text();
        throw new Error('서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.');
      }

      const user = data.result?.data?.json;

      if (user && user.success && user.appRole) {
        // 세션 저장
        sessionStorage.setItem('adminUser', JSON.stringify(user));
        // 리다이렉트는 항상 현재 origin 기준 (개발/배포 모두 동일하게)
        if (user.appRole === 'hq_admin') {
          window.location.href = '/preview/admin/dashboard.html';
        } else if (user.appRole === 'branch_manager') {
          window.location.href = '/preview/admin/branch.html';
        } else {
          window.location.href = '/preview/admin/tech.html';
        }
      } else {
        const errMsg = user?.error || data.error?.json?.message || '';
        throw new Error(errMsg || '아이디 또는 비밀번호가 올바르지 않습니다.');
      }
    } catch (err) {
      // 기술적 오류 문구 대신 사용자 친화적 메시지 표시
      let msg = err.message || '';
      if (!msg || msg.includes('JSON') || msg.includes('token') || msg.includes('fetch') || msg.includes('Failed')) {
        msg = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.';
      }
      errEl.textContent = msg;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = '로그인';
    }
  }
</script>
</body>
</html>
