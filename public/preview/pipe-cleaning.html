<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/preview/auth-check.js"></script>
  <script src="/preview/maintenance.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배관청소 신청 - 퓨처에너지테크</title>
  <style>
    :root { --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #eff6ff; --text: #1f2937; --muted: #6b7280; --border: #e5e7eb; --bg: #ffffff; --surface: #f9fafb; --error: #ef4444; --success: #22c55e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: var(--text); background: var(--surface); }
    a { text-decoration: none; color: inherit; }
    header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; color: #e85d04; }
    .back-btn { color: var(--muted); font-size: 14px; }
    .back-btn:hover { color: var(--primary); }
    .page-hero { background: linear-gradient(135deg, #1e3a8a, #1d4ed8); color: #fff; padding: 40px 24px; text-align: center; }
    .page-hero h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 800; margin-bottom: 8px; }
    .page-hero p { color: rgba(255,255,255,.75); font-size: 15px; }
    .form-container { max-width: 720px; margin: 32px auto; padding: 0 16px 60px; }
    .form-card { background: var(--bg); border-radius: 20px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,.06); margin-bottom: 20px; }
    .form-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--primary-light); color: var(--primary); }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    label .req { color: var(--error); margin-left: 2px; }
    input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; background: var(--bg); color: var(--text); transition: border-color .15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; min-height: 100px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
    .service-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .option-item { display: flex; align-items: flex-start; gap: 10px; padding: 14px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .15s; }
    .option-item:hover { border-color: var(--primary); background: var(--primary-light); }
    .option-item.selected { border-color: var(--primary); background: var(--primary-light); }
    .option-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
    .option-title { font-size: 14px; font-weight: 600; }
    .option-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .time-btn { padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); font-size: 14px; cursor: pointer; text-align: center; transition: all .15s; }
    .time-btn:hover, .time-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; transition: background .15s, transform .1s; box-shadow: 0 4px 16px rgba(37,99,235,.35); }
    .submit-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .submit-btn:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }
    .success-box { display: none; background: #f0fdf4; border: 2px solid var(--success); border-radius: 16px; padding: 32px; text-align: center; }
    .success-box.show { display: block; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .info-box { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 16px; font-size: 14px; color: #1e40af; line-height: 1.7; margin-bottom: 20px; }
  </style>
</head>
<body>
<header>
  <a href="/preview/index.html" class="logo">🔥 퓨처에너지</a>
  <a href="/preview/index.html" class="back-btn">← 홈으로</a>
</header>

<div class="page-hero">
  <h1>🚿 배관청소 신청</h1>
  <p>전문 장비로 난방 배관을 세척하여 효율을 높이고 난방비를 절감하세요</p>
</div>

<div class="form-container">
  <div class="info-box">
    💡 <strong>배관청소 효과:</strong> 배관 내 스케일·녹·이물질 제거로 난방 효율 20~30% 향상, 난방비 절감, 보일러 수명 연장
  </div>

  <div id="successBox" class="success-box">
    <div style="font-size:56px;margin-bottom:16px;">✅</div>
    <h3 style="font-size:22px;font-weight:800;color:#15803d;margin-bottom:8px;">신청이 완료되었습니다!</h3>
    <p style="color:#166534;font-size:15px;line-height:1.7;">담당자가 확인 후 연락드리겠습니다.<br />접수 번호: <strong id="receiptNum"></strong></p>
    <br />
    <a href="/preview/index.html" style="color:#2563eb;font-weight:700;">← 홈으로 돌아가기</a>
  </div>

  <form id="cleaningForm">
    <div class="form-card">
      <h2>📋 고객 정보</h2>
      <div class="form-row">
        <div class="form-group">
          <label>이름 <span class="req">*</span></label>
          <input type="text" id="customerName" placeholder="홍길동" required />
        </div>
        <div class="form-group">
          <label>휴대폰 번호 <span class="req">*</span></label>
          <input type="tel" id="customerPhone" placeholder="010-0000-0000" required />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>📍 주소 정보</h2>
      <div class="form-group">
        <label>아파트(단지)명 <span class="req">*</span></label>
        <input type="text" id="aptName" placeholder="예: 안산 푸르지오" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>동 <span class="req">*</span></label>
          <input type="text" id="aptDong" placeholder="예: 101" required />
        </div>
        <div class="form-group">
          <label>호수 <span class="req">*</span></label>
          <input type="text" id="aptHo" placeholder="예: 1502" required />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>🔧 서비스 선택</h2>
      <div class="service-options">
        <label class="option-item">
          <input type="checkbox" value="기본배관청소" onchange="toggleOption(this)" />
          <div><div class="option-title">기본 배관청소</div><div class="option-desc">전체 난방 배관 세척</div></div>
        </label>
        <label class="option-item">
          <input type="checkbox" value="분배기청소" onchange="toggleOption(this)" />
          <div><div class="option-title">분배기 청소</div><div class="option-desc">분배기 내부 세척 및 점검</div></div>
        </label>
        <label class="option-item">
          <input type="checkbox" value="보일러점검" onchange="toggleOption(this)" />
          <div><div class="option-title">보일러 점검</div><div class="option-desc">보일러 상태 점검 포함</div></div>
        </label>
        <label class="option-item">
          <input type="checkbox" value="전체패키지" onchange="toggleOption(this)" />
          <div><div class="option-title">전체 패키지</div><div class="option-desc">배관+분배기+보일러 통합</div></div>
        </label>
      </div>
    </div>

    <div class="form-card">
      <h2>📅 방문 희망 일정</h2>
      <div class="form-group">
        <label>방문 희망 날짜 <span class="req">*</span></label>
        <input type="date" id="visitDate" required />
        <p class="hint">오늘 이후 날짜를 선택해 주세요</p>
      </div>
      <div class="form-group">
        <label>방문 희망 시간</label>
        <div class="time-grid">
          <div class="time-btn" onclick="selectTime(this,'오전 9시')">오전 9시</div>
          <div class="time-btn" onclick="selectTime(this,'오전 10시')">오전 10시</div>
          <div class="time-btn" onclick="selectTime(this,'오전 11시')">오전 11시</div>
          <div class="time-btn" onclick="selectTime(this,'오후 1시')">오후 1시</div>
          <div class="time-btn" onclick="selectTime(this,'오후 2시')">오후 2시</div>
          <div class="time-btn" onclick="selectTime(this,'오후 3시')">오후 3시</div>
          <div class="time-btn" onclick="selectTime(this,'오후 4시')">오후 4시</div>
          <div class="time-btn" onclick="selectTime(this,'오후 5시')">오후 5시</div>
        </div>
      </div>
      <div class="form-group">
        <label>추가 요청사항</label>
        <textarea id="memo" placeholder="특이사항이나 요청사항을 입력해 주세요 (선택사항)" rows="3"></textarea>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">신청하기</button>
  </form>
</div>

<script>
  const API = '/api/trpc';
  let selectedServices = [];
  let selectedTime = '';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('visitDate').min = today;

  function toggleOption(cb) {
    const label = cb.closest('.option-item');
    if (cb.checked) { selectedServices.push(cb.value); label.classList.add('selected'); }
    else { selectedServices = selectedServices.filter(s => s !== cb.value); label.classList.remove('selected'); }
  }

  function selectTime(btn, time) {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTime = time;
  }

  document.getElementById('customerPhone').addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '');
    if (v.length <= 3) this.value = v;
    else if (v.length <= 7) this.value = v.slice(0,3) + '-' + v.slice(3);
    else this.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
  });

  document.getElementById('cleaningForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const aptName = document.getElementById('aptName').value.trim();
    const dong = document.getElementById('aptDong').value.trim();
    const ho = document.getElementById('aptHo').value.trim();
    const visitDate = document.getElementById('visitDate').value;
    const memo = document.getElementById('memo').value.trim();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '신청 중...';

    try {
      const res = await fetch(API + '/cleaning.create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ json: { customerName: name, customerPhone: phone, aptName, dong, ho, services: selectedServices, visitDate, visitTime: selectedTime || '미정', memo, source: 'web' } })
      });
      const data = await res.json();
      if (data.result?.data?.json?.id) {
        document.getElementById('cleaningForm').style.display = 'none';
        document.getElementById('receiptNum').textContent = data.result.data.json.id;
        document.getElementById('successBox').classList.add('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        throw new Error(data.error?.message || '신청 실패');
      }
    } catch (err) {
      alert('신청 중 오류가 발생했습니다: ' + err.message);
      btn.disabled = false; btn.textContent = '신청하기';
    }
  });
</script>
</body>
</html>
