<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퓨처에너지테크 - 홈페이지 준비 중</title>
  <meta name="description" content="퓨처에너지테크 홈페이지를 준비 중입니다. 난방 고장 및 긴급 상담: 031-8042-7310">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 52px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .logo-text {
      text-align: left;
    }
    .logo-text h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .logo-text p {
      font-size: 12px;
      color: #999;
      margin-top: 3px;
    }
    .divider {
      width: 56px;
      height: 3px;
      background: linear-gradient(90deg, #FF6B35, #FF8C42);
      border-radius: 2px;
      margin: 0 auto 32px;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .desc {
      font-size: 15px;
      color: #555;
      line-height: 1.85;
      margin-bottom: 40px;
    }
    .contact-label {
      font-size: 12px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
    .phone-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .phone-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .phone-btn:hover { transform: translateY(-2px); opacity: 0.92; }
    .phone-btn:active { transform: scale(0.97); }
    .phone-btn.primary {
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,107,53,0.32);
    }
    .phone-btn.secondary {
      background: #EEF2FF;
      color: #3730A3;
      border: 1.5px solid #C7D2FE;
    }
    .phone-icon { font-size: 22px; }
    .phone-info {
      text-align: left;
      line-height: 1.3;
    }
    .phone-sub {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.72;
      margin-top: 2px;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #ccc;
    }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      .title { font-size: 21px; }
      .phone-btn { font-size: 16px; padding: 16px 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🔥</div>
      <div class="logo-text">
        <h1>퓨처에너지테크</h1>
        <p>Future Energy Tech</p>
      </div>
    </div>

    <div class="divider"></div>

    <h2 class="title">홈페이지 준비 중입니다.</h2>
    <p class="desc">
      더 나은 난방 관리 서비스를 제공하기 위해<br>
      홈페이지를 준비하고 있습니다.<br><br>
      난방 고장 및 긴급 상담은<br>
      아래 번호로 연락해 주세요.
    </p>

    <p class="contact-label">긴급 상담 연락처</p>
    <div class="phone-list">
      <a href="tel:031-8042-7310" class="phone-btn primary">
        <span class="phone-icon">📞</span>
        <div class="phone-info">
          <div>031-8042-7310</div>
          <div class="phone-sub">대표전화 &nbsp;·&nbsp; 평일 08:00 ~ 18:00</div>
        </div>
      </a>
      <a href="tel:010-5754-7310" class="phone-btn secondary">
        <span class="phone-icon">📱</span>
        <div class="phone-info">
          <div>010-5754-7310</div>
          <div class="phone-sub">휴대전화 &nbsp;·&nbsp; 긴급 상담 가능</div>
        </div>
      </a>
    </div>

    <p class="footer">© 2025 퓨처에너지테크. All rights reserved.</p>
  </div>
</body>
</html>
